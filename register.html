<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#090A14',
            primary: '#DF6B33',
            surface: '#12141F',
            border: '#1E2133',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090A14; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #E2E8F0;
      -webkit-box-shadow: 0 0 0px 1000px #12141F inset;
      transition: background-color 5000s ease-in-out 0s;
    }
    select option { background-color: #090A14; color: #E2E8F0; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center font-inter text-slate-200 px-4 py-12">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4" style="background-color: #DF6B33;">
        <i data-lucide="user-plus" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="font-poppins text-3xl font-extrabold text-white">Create Account</h1>
      <p class="font-inter text-sm mt-1" style="color: #94A3B8;">Join us and get started today</p>
    </div>

    <!-- Card -->
    <div class="rounded-3xl p-8 md:p-10" style="background-color: #12141F; border: 1px solid #1E2133;">

      <form id="registerForm" class="space-y-5" novalidate>

        <!-- Full Name -->
        <div>
          <label class="block font-poppins font-semibold text-sm text-white mb-2" for="fullname">Full Name <span style="color: #DF6B33;">*</span></label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input
              id="fullname"
              type="text"
              placeholder="John Doe"
              autocomplete="name"
              class="w-full pl-11 pr-11 py-3.5 rounded-xl text-sm font-inter text-slate-200 placeholder-slate-500 focus:outline-none transition-all duration-200"
              style="background-color: #090A14; border: 1px solid #1E2133;"
            />
          </div>
          <p class="mt-1.5 text-xs font-inter hidden" id="fullnameError" style="color: #F87171;"></p>
        </div>

        <!-- Email -->
        <div>
          <label class="block font-poppins font-semibold text-sm text-white mb-2" for="email">Email Address</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm font-inter text-slate-200 placeholder-slate-500 focus:outline-none transition-all duration-200"
              style="background-color: #090A14; border: 1px solid #1E2133;"
            />
            <span class="absolute right-4 top-1/2 -translate-y-1/2 hidden" id="emailErrorIcon">
              <i data-lucide="alert-circle" class="w-4 h-4 text-red-400"></i>
            </span>
          </div>
          <p class="mt-1.5 text-xs font-inter hidden" id="emailError" style="color: #F87171;"></p>
        </div>

        <!-- Password -->
        <div>
          <label class="block font-poppins font-semibold text-sm text-white mb-2" for="password">Password</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Create a strong password"
              autocomplete="new-password"
              class="w-full pl-11 pr-11 py-3.5 rounded-xl text-sm font-inter text-slate-200 placeholder-slate-500 focus:outline-none transition-all duration-200"
              style="background-color: #090A14; border: 1px solid #1E2133;"
            />
            <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors">
              <i data-lucide="eye-off" class="w-4 h-4" id="eyeIcon"></i>
            </button>
          </div>
          <p class="mt-1.5 text-xs font-inter hidden" id="passwordError" style="color: #F87171;"></p>
        </div>

        <!-- Phone + Gender row -->
        <div class="grid grid-cols-2 gap-3">

          <!-- Phone -->
          <div>
            <label class="block font-poppins font-semibold text-sm text-white mb-2" for="phone">Phone</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="phone" class="w-4 h-4"></i>
              </span>
              <input
                id="phone"
                type="tel"
                placeholder="+84..."
                autocomplete="tel"
                class="w-full pl-10 pr-3 py-3.5 rounded-xl text-sm font-inter text-slate-200 placeholder-slate-500 focus:outline-none transition-all duration-200"
                style="background-color: #090A14; border: 1px solid #1E2133;"
              />
            </div>
          </div>

          <!-- Gender -->
          <div>
            <label class="block font-poppins font-semibold text-sm text-white mb-2" for="gender">Gender</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <i data-lucide="gender" class="w-4 h-4"></i>
              </span>
              <select
                id="gender"
                class="w-full pl-10 pr-3 py-3.5 rounded-xl text-sm font-inter text-slate-400 focus:outline-none transition-all duration-200 appearance-none cursor-pointer"
                style="background-color: #090A14; border: 1px solid #1E2133;"
              >
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer-not">Prefer not to say</option>
              </select>
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
              </span>
            </div>
          </div>
        </div>

        <!-- Address -->
        <div>
          <label class="block font-poppins font-semibold text-sm text-white mb-2" for="address">Address</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <i data-lucide="map-pin" class="w-4 h-4"></i>
            </span>
            <input
              id="address"
              type="text"
              placeholder="123 Main Street, City"
              autocomplete="street-address"
              class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm font-inter text-slate-200 placeholder-slate-500 focus:outline-none transition-all duration-200"
              style="background-color: #090A14; border: 1px solid #1E2133;"
            />
          </div>
        </div>

        <!-- Terms -->
        <label class="flex items-start gap-2.5 cursor-pointer select-none pt-1">
          <div class="relative mt-0.5">
            <input type="checkbox" id="terms" class="sr-only peer" />
            <div class="w-5 h-5 rounded-md flex items-center justify-center transition-all duration-200 peer-checked:bg-primary"
                 style="background-color: #1E2133; border: 1px solid #1E2133;">
              <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
            </div>
          </div>
          <span class="text-sm font-inter text-slate-300 leading-snug">
            I agree to the
            <a href="#" class="font-semibold hover:underline transition-all" style="color: #DF6B33;">Terms of Service</a>
            and
            <a href="#" class="font-semibold hover:underline transition-all" style="color: #DF6B33;">Privacy Policy</a>
          </span>
        </label>
        <p class="mt-1.5 text-xs font-inter hidden" id="termsError" style="color: #F87171;"></p>

        <!-- Success message -->
        <p id="successMsg" class="text-sm font-inter hidden" style="color: #4ADE80;"></p>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-3.5 rounded-xl font-poppins font-bold text-white text-sm tracking-wide transition-all duration-200 hover:brightness-110 active:scale-[0.98]"
          style="background-color: #DF6B33;"
        >
          Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-7">
        <div class="flex-1 h-px" style="background-color: #1E2133;"></div>
        <span class="text-xs font-inter" style="color: #64748B;">or continue with</span>
        <div class="flex-1 h-px" style="background-color: #1E2133;"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-3 gap-3">

        <!-- Google -->
        <button class="flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-inter font-medium text-slate-200 transition-all duration-200 hover:brightness-125 active:scale-[0.97]"
                style="background-color: #090A14; border: 1px solid #1E2133;">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="hidden sm:inline">Google</span>
        </button>

        <!-- GitHub -->
        <button class="flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-inter font-medium text-slate-200 transition-all duration-200 hover:brightness-125 active:scale-[0.97]"
                style="background-color: #090A14; border: 1px solid #1E2133;">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          <span class="hidden sm:inline">GitHub</span>
        </button>

        <!-- Facebook -->
        <button class="flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-inter font-medium text-slate-200 transition-all duration-200 hover:brightness-125 active:scale-[0.97]"
                style="background-color: #090A14; border: 1px solid #1E2133;">
          <svg class="w-4 h-4" fill="#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span class="hidden sm:inline">Facebook</span>
        </button>
      </div>

      <!-- Back to login -->
      <p class="text-center mt-8 text-sm font-inter" style="color: #64748B;">
        Already have an account?
        <a href="login.html" class="font-semibold hover:underline transition-all" style="color: #DF6B33;">Sign in</a>
      </p>

    </div>
  </div>

  <script>
    lucide.createIcons();

    const fullnameInput  = document.getElementById('fullname');
    const emailInput     = document.getElementById('email');
    const passwordInput  = document.getElementById('password');
    const termsInput     = document.getElementById('terms');
    const fullnameError = document.getElementById('fullnameError');
    const emailError     = document.getElementById('emailError');
    const passwordError  = document.getElementById('passwordError');
    const termsError     = document.getElementById('termsError');
    const emailErrorIcon = document.getElementById('emailErrorIcon');
    const successMsg     = document.getElementById('successMsg');
    const form           = document.getElementById('registerForm');
    const eyeIcon        = document.getElementById('eyeIcon');

    const VALID_EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setError(input, errorEl, errorIcon, msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
      if (errorIcon) errorIcon.classList.remove('hidden');
      input.style.borderColor = '#F87171';
    }

    function clearError(input, errorEl, errorIcon) {
      errorEl.classList.add('hidden');
      if (errorIcon) errorIcon.classList.add('hidden');
      input.style.borderColor = '#1E2133';
    }

    // Full Name
    fullnameInput.addEventListener('blur', () => {
      if (!fullnameInput.value.trim()) {
        setError(fullnameInput, fullnameError, null, 'Full name is required.');
      } else {
        clearError(fullnameInput, fullnameError, null);
      }
    });
    fullnameInput.addEventListener('input', () => {
      if (fullnameError.textContent && fullnameInput.value.trim()) {
        clearError(fullnameInput, fullnameError, null);
      }
    });

    // Email
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (val && !VALID_EMAIL.test(val)) {
        setError(emailInput, emailError, emailErrorIcon, 'Invalid email address.');
      } else {
        clearError(emailInput, emailError, emailErrorIcon);
      }
    });
    emailInput.addEventListener('input', () => {
      if (emailError.textContent) {
        const val = emailInput.value.trim();
        if (!val || VALID_EMAIL.test(val)) {
          clearError(emailInput, emailError, emailErrorIcon);
        }
      }
    });

    // Password
    passwordInput.addEventListener('blur', () => {
      const val = passwordInput.value;
      if (val && val.length < 8) {
        setError(passwordInput, passwordError, null, 'Password must be at least 8 characters.');
      } else {
        clearError(passwordInput, passwordError, null);
      }
    });
    passwordInput.addEventListener('input', () => {
      if (passwordError.textContent) {
        const val = passwordInput.value;
        if (!val || val.length >= 8) {
          clearError(passwordInput, passwordError, null);
        }
      }
    });

    // Terms
    termsInput.addEventListener('change', () => {
      if (termsInput.checked) {
        termsError.classList.add('hidden');
      }
    });

    // Focus accent
    [fullnameInput, emailInput, passwordInput].forEach(input => {
      input.addEventListener('focus', () => {
        if (input.style.borderColor !== '#F87171') {
          input.style.borderColor = '#DF6B33';
        }
      });
      input.addEventListener('blur', () => {
        if (input.style.borderColor !== '#F87171') {
          input.style.borderColor = '#1E2133';
        }
      });
    });

    // Submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let hasError = false;

      if (!fullnameInput.value.trim()) {
        setError(fullnameInput, fullnameError, null, 'Full name is required.');
        hasError = true;
      }

      const emailVal = emailInput.value.trim();
      if (emailVal && !VALID_EMAIL.test(emailVal)) {
        setError(emailInput, emailError, emailErrorIcon, 'Invalid email address.');
        hasError = true;
      }

      const passVal = passwordInput.value;
      if (passVal && passVal.length < 8) {
        setError(passwordInput, passwordError, null, 'Password must be at least 8 characters.');
        hasError = true;
      }

      if (!termsInput.checked) {
        termsError.textContent = 'You must agree to the terms to continue.';
        termsError.classList.remove('hidden');
        hasError = true;
      }

      if (hasError) return;

      clearError(fullnameInput, fullnameError, null);
      clearError(emailInput, emailError, emailErrorIcon);
      clearError(passwordInput, passwordError, null);
      termsError.classList.add('hidden');
      successMsg.textContent = 'Account created successfully! Redirecting...';
      successMsg.classList.remove('hidden');
    });

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye' : 'eye-off');
      lucide.createIcons();
    });
  </script>
</body>
</html>
